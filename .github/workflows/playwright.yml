name: Playwright API Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
  repository_dispatch:
    types: [run-playwright-tests]

permissions:
  contents: read
  packages: write

env:
  TEST_IMAGE: ghcr.io/priya7781/api-automation-framework-tests:latest

jobs:
  api-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check whether image inputs changed
        id: image-changes
        shell: bash
        run: |
          if ! docker pull "$TEST_IMAGE"; then
            echo "rebuild=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "push" ] && \
            ! git diff --quiet HEAD^ HEAD -- Dockerfile package.json package-lock.json; then
            echo "rebuild=true" >> "$GITHUB_OUTPUT"
          else
            echo "rebuild=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and publish Docker image
        if: steps.image-changes.outputs.rebuild == 'true' && github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.TEST_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Docker image for pull request
        if: steps.image-changes.outputs.rebuild == 'true' && github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ${{ env.TEST_IMAGE }}
          cache-from: type=gha

      - name: Pull Docker image
        if: steps.image-changes.outputs.rebuild == 'true' && github.event_name != 'pull_request'
        run: docker pull "$TEST_IMAGE"

      - name: Run tests in Docker
        run: |
          mkdir -p playwright-report
          docker run --rm \
            --env API_AUTH_TOKEN \
            --volume "${{ github.workspace }}:/app" \
            "$TEST_IMAGE"
        env:
          API_AUTH_TOKEN: ${{ secrets.API_AUTH_TOKEN }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 14
